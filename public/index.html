<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>POLYARB // ETH LADDER</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<script src="/socket.io/socket.io.js"></script>
<style>
  :root {
    --bg:#080c10; --panel:#0d1219; --border:#1a2535;
    --text:#c8d8e8; --dim:#4a6070;
    --green:#00e676; --red:#ff3d5a; --amber:#ffb300; --cyan:#00cfff; --purple:#b388ff;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;}

  header{display:flex;align-items:center;justify-content:space-between;
    padding:10px 16px;border-bottom:1px solid var(--border);
    background:var(--panel);position:sticky;top:0;z-index:10;}
  .brand{font-family:'Bebas Neue';font-size:20px;letter-spacing:3px;color:var(--cyan);}
  .brand span{color:var(--amber);}
  .stats{display:flex;gap:20px;align-items:center;}
  .stat label{display:block;font-size:9px;color:var(--dim);letter-spacing:1px;}
  .stat value{display:block;font-size:15px;font-weight:700;color:var(--cyan);}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--green);
    box-shadow:0 0 6px var(--green);animation:pulse 1.5s infinite;}
  .dot.off{background:var(--red);box-shadow:none;animation:none;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  main{padding:12px 16px;display:flex;flex-direction:column;gap:12px;max-width:700px;margin:0 auto;}
  .panel{background:var(--panel);border:1px solid var(--border);border-radius:4px;overflow:hidden;}
  .ph{display:flex;justify-content:space-between;align-items:center;
    padding:7px 12px;border-bottom:1px solid var(--border);
    font-size:9px;font-weight:700;letter-spacing:2px;color:var(--dim);text-transform:uppercase;}
  .ph span{color:var(--cyan);font-size:11px;}

  .window-status{padding:12px;}
  .ws-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .ws-timer{font-size:28px;font-weight:700;color:var(--amber);}
  .ws-timer.stopped{color:var(--dim);}
  .ws-info{font-size:10px;color:var(--dim);text-align:right;line-height:1.8;}

  .price-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;}
  .price-card{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:4px;padding:10px 12px;}
  .price-card.active-up{border-color:var(--green);background:rgba(0,230,118,0.06);}
  .price-card.active-dn{border-color:var(--red);background:rgba(255,61,90,0.06);}
  .pc-label{font-size:9px;color:var(--dim);letter-spacing:1px;margin-bottom:4px;}
  .pc-price{font-size:20px;font-weight:700;}
  .pc-price.up{color:var(--green);}
  .pc-price.dn{color:var(--red);}
  .pc-shares{font-size:9px;color:var(--amber);margin-top:2px;min-height:12px;}

  .ladder{display:flex;gap:4px;margin-bottom:8px;}
  .lv{flex:1;padding:5px 4px;border-radius:3px;font-size:9px;font-weight:700;
    text-align:center;border:1px solid var(--border);color:var(--dim);line-height:1.6;}
  .lv.hit{border-color:var(--amber);color:var(--amber);background:rgba(255,179,0,0.1);}
  .lv label{display:block;font-size:8px;color:var(--dim);margin-bottom:1px;}

  .flip-row{display:flex;gap:8px;align-items:center;}
  .flip-badge{background:rgba(179,136,255,0.15);border:1px solid var(--purple);
    color:var(--purple);padding:3px 10px;border-radius:3px;font-size:10px;font-weight:700;}
  .side-badge{padding:3px 12px;border-radius:3px;font-size:10px;font-weight:700;}
  .side-UP{background:rgba(0,230,118,0.15);border:1px solid var(--green);color:var(--green);}
  .side-DOWN{background:rgba(255,61,90,0.15);border:1px solid var(--red);color:var(--red);}
  .side-NONE{background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--dim);}

  .tt{width:100%;border-collapse:collapse;font-size:11px;}
  .tt th{padding:5px 10px;font-size:9px;color:var(--dim);letter-spacing:1px;
    border-bottom:1px solid var(--border);text-align:left;}
  .tt td{padding:5px 10px;border-bottom:1px solid var(--border);}
  .tt tr:last-child td{border-bottom:none;}
  .pos{color:var(--green);font-weight:700;}
  .neg{color:var(--red);font-weight:700;}
  .empty{padding:16px;text-align:center;color:var(--dim);}

  #log{height:150px;overflow-y:auto;padding:8px 12px;}
  #log::-webkit-scrollbar{width:3px;}
  #log::-webkit-scrollbar-thumb{background:var(--border);}
  .ll{padding:1px 0;color:var(--dim);line-height:1.6;}
  .ll.buy{color:var(--green);}
  .ll.flip{color:var(--purple);}
  .ll.resolved{color:var(--cyan);}
  .ll.warn{color:var(--red);}
  .ll.info{color:var(--text);}
</style>
</head>
<body>
<header>
  <div class="brand">POLY<span>ARB</span> // ETH LADDER</div>
  <div class="stats">
    <div class="stat"><label>BALANCE</label><value id="s-bal">$—</value></div>
    <div class="stat"><label>P&L</label><value id="s-pnl">$—</value></div>
    <div class="stat"><label>OPEN</label><value id="s-open">0</value></div>
    <div class="stat"><label>WS</label><div class="dot off" id="wsdot"></div></div>
  </div>
</header>

<main>
  <div class="panel">
    <div class="ph">5M Window <span id="ws-ts">—</span></div>
    <div class="window-status">

      <div class="ws-row">
        <div id="ws-timer" class="ws-timer">—:——</div>
        <div class="ws-info" id="ws-info">Searching for market…</div>
      </div>

      <div class="price-grid">
        <div class="price-card" id="card-btc-up">
          <div class="pc-label">BTC ↑ UP</div>
          <div class="pc-price up" id="p-btc-up">—</div>
        </div>
        <div class="price-card" id="card-btc-dn">
          <div class="pc-label">BTC ↓ DOWN</div>
          <div class="pc-price dn" id="p-btc-dn">—</div>
        </div>
        <div class="price-card" id="card-eth-up">
          <div class="pc-label">ETH ↑ UP</div>
          <div class="pc-price up" id="p-eth-up">—</div>
          <div class="pc-shares" id="sh-eth-up"></div>
        </div>
        <div class="price-card" id="card-eth-dn">
          <div class="pc-label">ETH ↓ DOWN</div>
          <div class="pc-price dn" id="p-eth-dn">—</div>
          <div class="pc-shares" id="sh-eth-dn"></div>
        </div>
      </div>

      <div class="ladder">
        <div class="lv" id="lv0"><label>L1</label>BTC≥0.70<br>ETH&lt;0.40</div>
        <div class="lv" id="lv1"><label>L2</label>BTC≥0.80<br>ETH&lt;0.50</div>
        <div class="lv" id="lv2"><label>L3</label>BTC≥0.90<br>ETH&lt;0.60</div>
        <div class="lv" id="lv3"><label>L4</label>BTC≥0.97<br>ETH&lt;0.67</div>
      </div>

      <div class="flip-row">
        <div class="flip-badge" id="flip-count">0 FLIPS</div>
        <div class="side-badge side-NONE" id="side-badge">NO POSITION</div>
        <div style="font-size:10px;color:var(--dim)" id="shares-total"></div>
      </div>

    </div>
  </div>

  <div class="panel">
    <div class="ph">Open Trades <span id="oc">0</span></div>
    <div id="open-trades"><div class="empty">No open trades</div></div>
  </div>

  <div class="panel">
    <div class="ph">Closed Trades <span id="cc">0</span></div>
    <div id="closed-trades"><div class="empty">No closed trades yet</div></div>
  </div>

  <div class="panel">
    <div class="ph">Log <span id="lc">0</span></div>
    <div id="log"></div>
  </div>
</main>

<script>
const socket = io();
let logCount = 0;

socket.on('connect',    () => document.getElementById('wsdot').classList.remove('off'));
socket.on('disconnect', () => document.getElementById('wsdot').classList.add('off'));

socket.on('snapshot', function(d) {
  console.log('SNAPSHOT:', JSON.stringify(d.window));
  // Header stats
  document.getElementById('s-bal').textContent = '$' + d.balance.toFixed(2);
  var pnlEl = document.getElementById('s-pnl');
  pnlEl.textContent = (d.totalPnl >= 0 ? '+$' : '-$') + Math.abs(d.totalPnl).toFixed(2);
  pnlEl.style.color = d.totalPnl > 0 ? 'var(--green)' : d.totalPnl < 0 ? 'var(--red)' : '';
  document.getElementById('s-open').textContent = d.openTrades.length;
  document.getElementById('oc').textContent = d.openTrades.length;
  document.getElementById('cc').textContent = d.closedTrades.length;

  if (d.window) {
    renderWindow(d.window);
  }
  renderOpen(d.openTrades || []);
  renderClosed(d.closedTrades || []);
});

socket.on('log', function(line) { addLog(line); });

// 1-second price updates
socket.on('prices', function(p) {
  if (p.btcUpPrice) document.getElementById('p-btc-up').textContent = p.btcUpPrice.toFixed(3);
  if (p.btcDnPrice) document.getElementById('p-btc-dn').textContent = p.btcDnPrice.toFixed(3);
  if (p.ethUpPrice) document.getElementById('p-eth-up').textContent = p.ethUpPrice.toFixed(3);
  if (p.ethDnPrice) document.getElementById('p-eth-dn').textContent = p.ethDnPrice.toFixed(3);
});

function fmt(n) {
  if (!n || n === 0) return '—';
  return Number(n).toFixed(3);
}

function renderWindow(w) {
  document.getElementById('ws-ts').textContent = 'ws:' + w.windowStart;

  // Timer
  var rem = w.remaining || 0;
  var mins = Math.floor(rem / 60);
  var secs = rem % 60;
  var timerEl = document.getElementById('ws-timer');
  timerEl.textContent = mins + ':' + (secs < 10 ? '0' : '') + secs;
  timerEl.className = 'ws-timer' + (w.stopped ? ' stopped' : '');

  // Info line
  document.getElementById('ws-info').innerHTML =
    (w.stopped ? 'Holding for resolution…' : w.elapsed + 's elapsed') +
    '<br>Updated: ' + new Date().toLocaleTimeString();

  // Prices — already numbers from bot, just display
  document.getElementById('p-btc-up').textContent = fmt(w.btcUpPrice);
  document.getElementById('p-btc-dn').textContent = fmt(w.btcDnPrice);
  document.getElementById('p-eth-up').textContent = fmt(w.ethUpPrice);
  document.getElementById('p-eth-dn').textContent = fmt(w.ethDnPrice);

  // Highlight active ETH card
  document.getElementById('card-eth-up').className = 'price-card' + (w.side === 'UP' ? ' active-up' : '');
  document.getElementById('card-eth-dn').className = 'price-card' + (w.side === 'DOWN' ? ' active-dn' : '');

  // Shares on card
  document.getElementById('sh-eth-up').textContent = (w.side === 'UP' && w.totalShares > 0) ? w.totalShares + ' shares held' : '';
  document.getElementById('sh-eth-dn').textContent = (w.side === 'DOWN' && w.totalShares > 0) ? w.totalShares + ' shares held' : '';

  // Ladder levels
  var levelsHit = w.levelsHit || [];
  for (var i = 0; i < 4; i++) {
    document.getElementById('lv' + i).className = 'lv' + (levelsHit.indexOf(i) >= 0 ? ' hit' : '');
  }

  // Flip badge
  document.getElementById('flip-count').textContent = w.flips + ' FLIP' + (w.flips !== 1 ? 'S' : '');

  // Side badge
  var sideBadge = document.getElementById('side-badge');
  if (w.side === 'UP') {
    sideBadge.textContent = 'ETH UP';
    sideBadge.className = 'side-badge side-UP';
  } else if (w.side === 'DOWN') {
    sideBadge.textContent = 'ETH DOWN';
    sideBadge.className = 'side-badge side-DOWN';
  } else {
    sideBadge.textContent = 'NO POSITION';
    sideBadge.className = 'side-badge side-NONE';
  }

  document.getElementById('shares-total').textContent =
    w.totalShares > 0 ? w.totalShares + ' shares @ ETH ' + w.side : '';
}

function renderOpen(trades) {
  var el = document.getElementById('open-trades');
  if (!trades.length) { el.innerHTML = '<div class="empty">No open trades</div>'; return; }
  var rows = trades.map(function(t) {
    var pnl = t.floatingPnl || 0;
    return '<tr>' +
      '<td style="color:var(--cyan)">' + t.id + '</td>' +
      '<td class="' + (t.side === 'UP' ? 'pos' : 'neg') + '">ETH ' + t.side + '</td>' +
      '<td style="color:var(--amber)">L' + t.level + '</td>' +
      '<td>' + t.shares + '</td>' +
      '<td>' + fmt(t.entryPrice) + '</td>' +
      '<td class="' + (pnl >= 0 ? 'pos' : 'neg') + '">' + (pnl >= 0 ? '+' : '') + '$' + pnl.toFixed(2) + '</td>' +
      '</tr>';
  }).join('');
  el.innerHTML = '<table class="tt"><thead><tr><th>ID</th><th>SIDE</th><th>LVL</th><th>SHARES</th><th>ENTRY</th><th>FLOAT P&L</th></tr></thead><tbody>' + rows + '</tbody></table>';
}

function renderClosed(trades) {
  var el = document.getElementById('closed-trades');
  if (!trades.length) { el.innerHTML = '<div class="empty">No closed trades yet</div>'; return; }
  var rows = trades.slice().reverse().map(function(t) {
    var pnl = t.realizedPnl || 0;
    return '<tr>' +
      '<td style="color:var(--cyan)">' + t.id + '</td>' +
      '<td class="' + (t.side === 'UP' ? 'pos' : 'neg') + '">ETH ' + t.side + '</td>' +
      '<td style="color:var(--amber)">L' + t.level + '</td>' +
      '<td>' + fmt(t.entryPrice) + '</td>' +
      '<td>' + fmt(t.exitPrice) + '</td>' +
      '<td class="' + (pnl >= 0 ? 'pos' : 'neg') + '">' + (pnl >= 0 ? '+' : '') + '$' + pnl.toFixed(2) + '</td>' +
      '<td style="color:var(--dim);font-size:9px">' + (t.exitReason || '—') + '</td>' +
      '</tr>';
  }).join('');
  el.innerHTML = '<table class="tt"><thead><tr><th>ID</th><th>SIDE</th><th>LVL</th><th>ENTRY</th><th>EXIT</th><th>P&L</th><th>REASON</th></tr></thead><tbody>' + rows + '</tbody></table>';
}

function addLog(line) {
  var el = document.createElement('div');
  var cls = 'll';
  if (line.indexOf('BUY') >= 0) cls += ' buy';
  else if (line.indexOf('FLIP') >= 0) cls += ' flip';
  else if (line.indexOf('RESOLVED') >= 0) cls += ' resolved';
  else if (line.indexOf('⚠️') >= 0) cls += ' warn';
  else if (line.indexOf('✅') >= 0 || line.indexOf('🚀') >= 0) cls += ' info';
  el.className = cls;
  el.textContent = line;
  var log = document.getElementById('log');
  log.appendChild(el);
  logCount++;
  document.getElementById('lc').textContent = logCount;
  while (log.children.length > 200) log.removeChild(log.firstChild);
  log.scrollTop = log.scrollHeight;
}
</script>
</body>
</html>
