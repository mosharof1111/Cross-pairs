<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HYDRA BOT</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<script src="/socket.io/socket.io.js"></script>
<style>
:root{--bg:#060a0f;--panel:#0b1118;--panel2:#0f1620;--border:#1c2a3a;--text:#c8dce8;--dim:#3a5060;--dim2:#4a6070;--green:#00e676;--red:#ff3d5a;--amber:#ffb300;--cyan:#00cfff;--purple:#b388ff;--orange:#ff9100;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;}
header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;padding:10px 16px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,#0b1118,#0d1520);position:sticky;top:0;z-index:100;}
.brand{font-family:'Bebas Neue';font-size:22px;letter-spacing:4px;color:var(--cyan);}
.brand em{color:var(--amber);font-style:normal;}
.sub{font-size:9px;color:var(--dim2);letter-spacing:1px;margin-top:2px;}
.hstats{display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
.hstat label{display:block;font-size:8px;color:var(--dim2);letter-spacing:1.5px;margin-bottom:2px;}
.hstat .val{font-size:15px;font-weight:700;color:var(--cyan);}
.hstat .val.pos{color:var(--green);}
.hstat .val.neg{color:var(--red);}
.wsdot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:blink 1.5s infinite;}
.wsdot.off{background:var(--red);box-shadow:none;animation:none;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
main{padding:12px;display:flex;flex-direction:column;gap:10px;max-width:900px;margin:0 auto;}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.ph{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;border-bottom:1px solid var(--border);background:var(--panel2);}
.ph h3{font-size:9px;font-weight:700;letter-spacing:2px;color:var(--dim2);text-transform:uppercase;}
.ph .badge{font-size:10px;color:var(--cyan);font-weight:700;}
.wb{padding:12px;}
.market-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:600px){.market-grid{grid-template-columns:1fr;}}
.mcard{border-radius:5px;border:1px solid var(--border);overflow:hidden;}
.mcard.btc-5m{border-color:rgba(255,179,0,0.4);}
.mcard.eth-5m{border-color:rgba(0,207,255,0.4);}
.mc-head{padding:7px 12px;display:flex;justify-content:space-between;align-items:center;font-size:9px;font-weight:700;letter-spacing:1px;}
.mcard.btc-5m .mc-head{background:rgba(255,179,0,0.08);color:var(--amber);}
.mcard.eth-5m .mc-head{background:rgba(0,207,255,0.08);color:var(--cyan);}
.mc-body{padding:10px 12px;}
.mini-timer-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.mini-timer{font-family:'Bebas Neue';font-size:32px;letter-spacing:1px;line-height:1;}
.mini-timer.g{color:var(--green);}
.mini-timer.a{color:var(--amber);}
.mini-timer.r{color:var(--red);}
.mini-timer.d{color:var(--dim2);}
.mini-prog-wrap{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
.mini-prog{height:100%;border-radius:2px;}
.mini-prog.ok{background:linear-gradient(90deg,var(--green),var(--cyan));}
.mini-prog.warn{background:linear-gradient(90deg,var(--amber),var(--red));}
.price-pills{display:flex;gap:5px;margin-bottom:8px;}
.ppill{flex:1;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:3px;padding:5px 7px;}
.ppill label{display:block;font-size:7px;color:var(--dim2);letter-spacing:1px;margin-bottom:2px;}
.ppill value{display:block;font-size:14px;font-weight:700;}
.ppill.asset value{color:var(--amber);}
.ppill.up value{color:var(--green);}
.ppill.dn value{color:var(--red);}
.pos-row{display:flex;gap:5px;margin-bottom:8px;}
.pos-pill{flex:1;border-radius:3px;padding:4px 6px;text-align:center;font-size:10px;font-weight:700;}
.pos-pill.up{border:1px solid var(--green);background:rgba(0,230,118,0.08);color:var(--green);}
.pos-pill.dn{border:1px solid var(--red);background:rgba(255,61,90,0.08);color:var(--red);}
.pos-pill.none{border:1px solid var(--border);color:var(--dim2);}
.sig-mini{border-radius:4px;padding:6px 8px;font-size:9px;font-weight:700;margin-bottom:6px;}
.sig-mini.none{background:rgba(255,255,255,0.02);border:1px solid var(--border);color:var(--dim2);}
.sig-mini.up{background:rgba(0,230,118,0.10);border:1px solid var(--green);color:var(--green);}
.sig-mini.down{background:rgba(255,61,90,0.10);border:1px solid var(--red);color:var(--red);}
.sig-mini.trending{background:rgba(255,179,0,0.08);border:1px solid var(--amber);color:var(--amber);}
.sig-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;}
.ss label{display:block;font-size:7px;color:var(--dim2);letter-spacing:1px;margin-bottom:1px;}
.ss value{display:block;font-size:11px;font-weight:700;}
.sbar{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--border);}
.sbi{background:var(--panel2);padding:8px;text-align:center;}
.sbi label{display:block;font-size:8px;color:var(--dim2);letter-spacing:1px;margin-bottom:3px;}
.sbi value{display:block;font-size:14px;font-weight:700;}
.tt{width:100%;border-collapse:collapse;}
.tt th{padding:5px 8px;font-size:8px;color:var(--dim2);letter-spacing:1px;border-bottom:1px solid var(--border);text-align:left;}
.tt td{padding:5px 8px;border-bottom:1px solid rgba(28,42,58,0.4);font-size:10px;}
.tt tr:last-child td{border-bottom:none;}
.pos{color:var(--green);font-weight:700;}
.neg{color:var(--red);font-weight:700;}
.empty{padding:20px;text-align:center;color:var(--dim2);}
#logb{height:150px;overflow-y:auto;padding:8px 12px;}
#logb::-webkit-scrollbar{width:3px;}
#logb::-webkit-scrollbar-thumb{background:var(--border);}
.ll{padding:2px 0;line-height:1.6;font-size:11px;color:var(--dim2);}
.ll.trade{color:var(--purple);}
.ll.flip{color:var(--orange);}
.ll.win{color:var(--green);}
.ll.loss{color:var(--red);}
.ll.price{color:var(--amber);}
.ll.inf{color:var(--text);}
</style>
</head>
<body>
<header>
  <div>
    <div class="brand"><em>HYDRA</em> BOT</div>
    <div class="sub">BTC+ETH · 5M · FLIP ON OPPOSITE · TP=0.99 · NO SL · 50 SHARES · $2000 DEMO</div>
  </div>
  <div class="hstats">
    <div class="hstat"><label>BALANCE</label><div class="val" id="h-bal">$—</div></div>
    <div class="hstat"><label>TOTAL P&L</label><div class="val" id="h-pnl">$0</div></div>
    <div class="hstat"><label>FEES PAID</label><div class="val" id="h-fees" style="color:var(--red)">$0</div></div>
    <div class="hstat"><label>OPEN</label><div class="val" id="h-open">0</div></div>
    <div class="hstat"><label>WS</label><div class="wsdot off" id="wsdot"></div></div>
  </div>
</header>
<main>

  <div class="panel">
    <div class="ph"><h3>Markets</h3><div class="badge" id="m-upd">—</div></div>
    <div class="wb">
      <div class="market-grid">
        <div class="mcard btc-5m">
          <div class="mc-head"><span>🟡 BTC 5M</span><span id="t-btc-5m">—:——</span></div>
          <div class="mc-body" id="body-btc-5m"></div>
        </div>
        <div class="mcard eth-5m">
          <div class="mc-head"><span>🔵 ETH 5M</span><span id="t-eth-5m">—:——</span></div>
          <div class="mc-body" id="body-eth-5m"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="ph"><h3>Session Stats</h3></div>
    <div class="sbar">
      <div class="sbi"><label>SIGNALS</label><value id="st-sig" style="color:var(--purple)">0</value></div>
      <div class="sbi"><label>WINS</label><value id="st-win" style="color:var(--green)">0</value></div>
      <div class="sbi"><label>LOSSES</label><value id="st-loss" style="color:var(--red)">0</value></div>
      <div class="sbi"><label>FLIPPED</label><value id="st-flip" style="color:var(--orange)">0</value></div>
      <div class="sbi"><label>NET P&L</label><value id="st-pnl">$0</value></div>
    </div>
  </div>

  <div class="panel">
    <div class="ph"><h3>Open Trades</h3><div class="badge" id="oc">0</div></div>
    <div id="open-t"><div class="empty">No open trades</div></div>
  </div>

  <div class="panel">
    <div class="ph"><h3>Closed Trades</h3><div class="badge" id="cc">0</div></div>
    <div id="closed-t"><div class="empty">No closed trades yet</div></div>
  </div>

  <div class="panel">
    <div class="ph"><h3>System Log</h3><div class="badge" id="lc">0</div></div>
    <div id="logb"></div>
  </div>

</main>
<script>
var socket = io();
var logCount = 0;
var localClocks = {};

setInterval(function() {
  for (var mid in localClocks) {
    var lc = localClocks[mid];
    if (!lc.windowStart) continue;
    var elapsed = Math.floor(Date.now() / 1000) - lc.windowStart;
    var rem = Math.max(0, 300 - elapsed);
    var m = Math.floor(rem / 60), s = rem % 60;
    var te = document.getElementById('t-' + mid);
    if (te) te.textContent = m + ':' + (s < 10 ? '0' : '') + s;
    var mt = document.getElementById('mt-' + mid);
    if (mt) {
      mt.textContent = m + ':' + (s < 10 ? '0' : '') + s;
      mt.className = 'mini-timer ' + (rem > 120 ? 'g' : rem > 30 ? 'a' : 'r');
    }
    var mp = document.getElementById('mp-' + mid);
    if (mp) {
      var pct = Math.min(100, (elapsed / 300) * 100);
      mp.style.width = pct + '%';
      mp.className = 'mini-prog ' + (pct > 80 ? 'warn' : 'ok');
    }
  }
}, 1000);

socket.on('connect',    function(){ document.getElementById('wsdot').classList.remove('off'); });
socket.on('disconnect', function(){ document.getElementById('wsdot').classList.add('off'); });

socket.on('snapshot', function(d) {
  set('h-bal',  '$' + d.balance.toFixed(2));
  set('h-open', d.openTrades.length);
  set('oc',     d.openTrades.length);
  set('cc',     d.closedTrades.length);
  if (d.totalFees !== undefined) set('h-fees', '$' + d.totalFees.toFixed(2));

  var pnlEl = document.getElementById('h-pnl');
  pnlEl.textContent = (d.totalPnl >= 0 ? '+$' : '-$') + Math.abs(d.totalPnl).toFixed(2);
  pnlEl.className = 'val' + (d.totalPnl > 0 ? ' pos' : d.totalPnl < 0 ? ' neg' : '');

  var cl = d.closedTrades;
  var wins   = cl.filter(function(t){ return (t.realizedPnl||0) > 0; }).length;
  var losses = cl.filter(function(t){ return (t.realizedPnl||0) < 0; }).length;
  var flips  = cl.filter(function(t){ return t.exitReason === 'FLIPPED'; }).length;
  set('st-sig',  cl.length + d.openTrades.length);
  set('st-win',  wins);
  set('st-loss', losses);
  set('st-flip', flips);
  var spnl = document.getElementById('st-pnl');
  spnl.textContent = (d.totalPnl >= 0 ? '+$' : '-$') + Math.abs(d.totalPnl).toFixed(2);
  spnl.style.color = d.totalPnl >= 0 ? 'var(--green)' : 'var(--red)';

  if (d.markets) {
    for (var mid in d.markets) renderMarketCard(mid, d.markets[mid]);
  }
  renderOpen(d.openTrades);
  renderClosed(d.closedTrades);
  set('m-upd', new Date().toLocaleTimeString());
});

socket.on('log', function(line){ addLog(line); });

function set(id, v){ var e = document.getElementById(id); if(e) e.textContent = v; }

function lastColor(dir) {
  if (dir === 'UP')   return 'var(--green)';
  if (dir === 'DOWN') return 'var(--red)';
  return 'var(--text)';
}

function renderMarketCard(mid, m) {
  localClocks[mid] = { windowStart: m.windowStart };
  var body = document.getElementById('body-' + mid);
  if (!body) return;
  var rem     = m.remaining || 0;
  var elapsed = m.elapsed   || 0;
  var pct     = Math.min(100, (elapsed / 300) * 100);
  var mn = Math.floor(rem / 60), sc = rem % 60;
  var timerCls = rem > 120 ? 'g' : rem > 30 ? 'a' : 'r';
  var progCls  = pct > 80 ? 'warn' : 'ok';

  var sigCls, sigText;
  if (m.isSignal && m.reversedDir) {
    sigCls  = m.reversedDir.toLowerCase();
    sigText = '🔄 BTC ' + (m.lastDir||'') + ' $' + (m.lastMove||0).toFixed(2) + ' → BUY ' + m.reversedDir;
  } else if (m.trending) {
    sigCls  = 'trending';
    sigText = '⚠️ TRENDING — skip';
  } else if (m.avg > 0) {
    sigCls  = 'none';
    sigText = '$' + (m.lastMove||0).toFixed(2) + ' vs need $' + (m.required||0).toFixed(2) + (m.lastMove > m.required ? ' ✅' : ' ❌');
  } else {
    sigCls  = 'none';
    sigText = 'Building history (' + (m.historyCount||0) + ' ticks)…';
  }

  var upPillCls = m.upCount > 0 ? 'up' : 'none';
  var dnPillCls = m.dnCount > 0 ? 'dn' : 'none';

  body.innerHTML =
    '<div class="mini-timer-row">' +
      '<div class="mini-timer ' + timerCls + '" id="mt-' + mid + '">' + mn + ':' + (sc<10?'0':'') + sc + '</div>' +
      '<div class="mini-prog-wrap"><div class="mini-prog ' + progCls + '" id="mp-' + mid + '" style="width:' + pct + '%"></div></div>' +
      '<div style="font-size:9px;color:var(--dim2);text-align:right;min-width:44px">T:' + (m.tradesThisWindow||0) + '<br>' + (m.blockElapsed||0) + 's</div>' +
    '</div>' +
    '<div class="price-pills">' +
      '<div class="ppill asset"><label>' + m.asset + '/USD</label><value>' + (m.assetPrice > 0 ? '$' + m.assetPrice.toFixed(2) : '$—') + '</value></div>' +
      '<div class="ppill up"><label>↑ UP</label><value>' + (m.upPrice > 0 ? m.upPrice.toFixed(3) : '—') + '</value></div>' +
      '<div class="ppill dn"><label>↓ DOWN</label><value>' + (m.dnPrice > 0 ? m.dnPrice.toFixed(3) : '—') + '</value></div>' +
    '</div>' +
    '<div class="pos-row">' +
      '<div class="pos-pill ' + upPillCls + '">↑ UP × ' + (m.upCount||0) + '</div>' +
      '<div class="pos-pill ' + dnPillCls + '">↓ DOWN × ' + (m.dnCount||0) + '</div>' +
    '</div>' +
    '<div class="sig-mini ' + sigCls + '">' + sigText + '</div>' +
    '<div class="sig-stats">' +
      '<div class="ss"><label>AVG</label><value style="color:var(--amber)">$' + (m.avg||0).toFixed(2) + '</value></div>' +
      '<div class="ss"><label>NEED</label><value style="color:var(--purple)">$' + (m.required||0).toFixed(2) + '</value></div>' +
      '<div class="ss"><label>LAST</label><value style="color:' + lastColor(m.lastDir) + '">$' + (m.lastMove||0).toFixed(2) + '</value></div>' +
      '<div class="ss"><label>TP</label><value style="color:var(--green)">0.99</value></div>' +
    '</div>';
}

function exitColor(r) {
  if (r === 'TP')       return 'var(--cyan)';
  if (r === 'RESOLVED') return 'var(--green)';
  if (r === 'FLIPPED')  return 'var(--orange)';
  return 'var(--dim2)';
}

function renderOpen(trades) {
  var el = document.getElementById('open-t');
  if (!trades.length) { el.innerHTML = '<div class="empty">No open trades</div>'; return; }
  var rows = trades.map(function(t) {
    var pnl = t.floatingPnl || 0;
    var col = t.marketId === 'btc-5m' ? 'var(--amber)' : 'var(--cyan)';
    return '<tr>' +
      '<td style="color:var(--cyan);font-size:9px">' + t.id + '</td>' +
      '<td style="color:' + col + ';font-size:9px">' + t.marketId + '</td>' +
      '<td class="' + (t.side==='UP'?'pos':'neg') + '">' + t.side + '</td>' +
      '<td>' + t.entryPrice.toFixed(3) + '</td>' +
      '<td style="color:var(--amber);font-size:9px">$' + (t.assetPriceAtEntry||'—') + '</td>' +
      '<td style="color:var(--red);font-size:9px">$' + (t.fee ? t.fee.toFixed(3) : '—') + '</td>' +
      '<td>' + t.shares + '</td>' +
      '<td>$' + t.cost.toFixed(2) + '</td>' +
      '<td class="' + (pnl>=0?'pos':'neg') + '">' + (pnl>=0?'+':'') + '$' + pnl.toFixed(2) + '</td>' +
      '</tr>';
  }).join('');
  el.innerHTML = '<table class="tt"><thead><tr><th>ID</th><th>MARKET</th><th>SIDE</th><th>ENTRY</th><th>PRICE</th><th>FEE</th><th>SHR</th><th>COST</th><th>FLOAT</th></tr></thead><tbody>' + rows + '</tbody></table>';
}

function renderClosed(trades) {
  var el = document.getElementById('closed-t');
  if (!trades.length) { el.innerHTML = '<div class="empty">No closed trades yet</div>'; return; }
  var rows = trades.slice().reverse().map(function(t) {
    var pnl = t.realizedPnl || 0;
    var col = t.marketId === 'btc-5m' ? 'var(--amber)' : 'var(--cyan)';
    var rsn = t.exitReason || '—';
    return '<tr>' +
      '<td style="color:var(--cyan);font-size:9px">' + t.id + '</td>' +
      '<td style="color:' + col + ';font-size:9px">' + t.marketId + '</td>' +
      '<td class="' + (t.side==='UP'?'pos':'neg') + '">' + t.side + '</td>' +
      '<td>' + t.entryPrice.toFixed(3) + '</td>' +
      '<td>' + (t.exitPrice ? t.exitPrice.toFixed(3) : '—') + '</td>' +
      '<td style="color:' + exitColor(rsn) + ';font-size:9px">' + rsn + '</td>' +
      '<td style="color:var(--red);font-size:9px">$' + (t.fee ? t.fee.toFixed(3) : '—') + '</td>' +
      '<td>' + t.shares + '</td>' +
      '<td class="' + (pnl>=0?'pos':'neg') + '">' + (pnl>=0?'+':'') + '$' + pnl.toFixed(2) + '</td>' +
      '</tr>';
  }).join('');
  el.innerHTML = '<table class="tt"><thead><tr><th>ID</th><th>MARKET</th><th>SIDE</th><th>ENTRY</th><th>EXIT</th><th>REASON</th><th>FEE</th><th>SHR</th><th>P&L</th></tr></thead><tbody>' + rows + '</tbody></table>';
}

function addLog(line) {
  var el = document.createElement('div');
  var c = 'll';
  if      (line.indexOf('FLIPPED') >= 0 || line.indexOf('🔄') >= 0) c += ' flip';
  else if (line.indexOf('🚀') >= 0)  c += ' trade';
  else if (line.indexOf('🟢') >= 0)  c += ' win';
  else if (line.indexOf('🔴') >= 0)  c += ' loss';
  else if (line.indexOf('💹') >= 0)  c += ' price';
  else if (line.indexOf('✅') >= 0)  c += ' inf';
  el.className = c;
  el.textContent = line;
  var lb = document.getElementById('logb');
  lb.appendChild(el);
  logCount++;
  set('lc', logCount);
  while (lb.children.length > 300) lb.removeChild(lb.firstChild);
  lb.scrollTop = lb.scrollHeight;
}
</script>
</body>
</html>
