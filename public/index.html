<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BTC PRE-MARKET LADDER</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<script src="/socket.io/socket.io.js"></script>
<style>
:root{--bg:#060a0f;--panel:#0b1118;--panel2:#0f1620;--border:#1c2a3a;--text:#c8dce8;--dim:#3a5060;--dim2:#4a6070;--green:#00e676;--red:#ff3d5a;--amber:#ffb300;--cyan:#00cfff;--purple:#b388ff;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;}
header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;padding:10px 16px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,#0b1118,#0d1520);position:sticky;top:0;z-index:100;}
.brand{font-family:'Bebas Neue';font-size:22px;letter-spacing:4px;color:var(--cyan);}
.brand em{color:var(--amber);font-style:normal;}
.sub{font-size:9px;color:var(--dim2);letter-spacing:1px;margin-top:2px;}
.hstats{display:flex;gap:16px;align-items:center;}
.hstat label{display:block;font-size:8px;color:var(--dim2);letter-spacing:1.5px;margin-bottom:2px;}
.hstat .val{font-size:16px;font-weight:700;color:var(--cyan);}
.hstat .val.pos{color:var(--green);}
.hstat .val.neg{color:var(--red);}
.wsdot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:blink 1.5s infinite;}
.wsdot.off{background:var(--red);box-shadow:none;animation:none;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
main{padding:12px;display:flex;flex-direction:column;gap:10px;max-width:900px;margin:0 auto;}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.ph{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;border-bottom:1px solid var(--border);background:var(--panel2);}
.ph h3{font-size:9px;font-weight:700;letter-spacing:2px;color:var(--dim2);text-transform:uppercase;}
.ph .badge{font-size:10px;color:var(--cyan);font-weight:700;}
.wb{padding:14px;}
.win-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:600px){.win-grid{grid-template-columns:1fr;}}
.wcard{border-radius:5px;border:1px solid var(--border);overflow:hidden;}
.wcard.live{border-color:var(--green);}
.wcard.pre{border-color:var(--amber);}
.wcard-head{padding:8px 12px;display:flex;justify-content:space-between;align-items:center;font-size:9px;font-weight:700;letter-spacing:1.5px;}
.wcard.live .wcard-head{background:rgba(0,230,118,0.08);color:var(--green);}
.wcard.pre .wcard-head{background:rgba(255,179,0,0.08);color:var(--amber);}
.wcard-body{padding:10px 12px;}
.big-timer{font-family:'Bebas Neue';font-size:40px;letter-spacing:2px;line-height:1;margin-bottom:6px;}
.big-timer.g{color:var(--green);}
.big-timer.a{color:var(--amber);}
.big-timer.r{color:var(--red);}
.big-timer.d{color:var(--dim2);}
.prog-wrap{height:3px;background:var(--border);border-radius:2px;margin-bottom:10px;overflow:hidden;}
.prog{height:100%;border-radius:2px;}
.prog.ok{background:linear-gradient(90deg,var(--green),var(--cyan));}
.prog.warn{background:linear-gradient(90deg,var(--amber),var(--red));}
.price-row{display:flex;gap:8px;margin-bottom:10px;}
.pcell{flex:1;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:4px;padding:8px 10px;}
.pcell label{display:block;font-size:8px;color:var(--dim2);letter-spacing:1px;margin-bottom:4px;}
.pcell .pval{font-size:20px;font-weight:700;}
.pcell .pval.up{color:var(--green);}
.pcell .pval.dn{color:var(--red);}
.pcell .psub{font-size:9px;color:var(--dim2);margin-top:2px;}
.ladder-wrap{margin-top:8px;}
.ladder-title{font-size:9px;color:var(--dim2);letter-spacing:1px;margin-bottom:5px;font-weight:700;}
.ladder-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;margin-bottom:6px;}
.lrung{border-radius:3px;padding:5px 3px;text-align:center;border:1px solid var(--border);font-size:9px;font-weight:700;color:var(--dim2);transition:all .3s;}
.lrung.sold{border-color:var(--green);background:rgba(0,230,118,0.12);color:var(--green);}
.lrung.pending{border-color:var(--amber);background:rgba(255,179,0,0.06);color:var(--amber);}
.lrung label{display:block;font-size:7px;color:inherit;margin-bottom:2px;opacity:.7;}
.ladder-bar{display:flex;gap:4px;align-items:center;margin-bottom:4px;}
.lbar-fill{height:6px;background:var(--green);border-radius:3px;transition:width .5s;}
.lbar-bg{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.lbar-text{font-size:9px;color:var(--dim2);white-space:nowrap;}
.sbar{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);}
.sbi{background:var(--panel2);padding:8px;text-align:center;}
.sbi label{display:block;font-size:8px;color:var(--dim2);letter-spacing:1px;margin-bottom:3px;}
.sbi value{display:block;font-size:15px;font-weight:700;}
.tt{width:100%;border-collapse:collapse;}
.tt th{padding:6px 10px;font-size:8px;color:var(--dim2);letter-spacing:1.5px;border-bottom:1px solid var(--border);text-align:left;}
.tt td{padding:6px 10px;border-bottom:1px solid rgba(28,42,58,0.5);font-size:11px;}
.tt tr:last-child td{border-bottom:none;}
.tt tr:hover td{background:rgba(255,255,255,0.02);}
.pos{color:var(--green);font-weight:700;}
.neg{color:var(--red);font-weight:700;}
.empty{padding:20px;text-align:center;color:var(--dim2);}
#logb{height:160px;overflow-y:auto;padding:8px 12px;}
#logb::-webkit-scrollbar{width:3px;}
#logb::-webkit-scrollbar-thumb{background:var(--border);}
.ll{padding:2px 0;line-height:1.6;font-size:11px;color:var(--dim2);}
.ll.buy{color:var(--cyan);}
.ll.sell{color:var(--green);}
.ll.res{color:var(--amber);}
.ll.err{color:var(--red);}
.ll.inf{color:var(--text);}
</style>
</head>
<body>
<header>
  <div>
    <div class="brand">BTC <em>PRE-MARKET</em> LADDER</div>
    <div class="sub">BUY 100 EACH SIDE PRE-MARKET · SELL LADDER 10 SHARES × 0.04 STEP · RESOLVE AT WINDOW END</div>
  </div>
  <div class="hstats">
    <div class="hstat"><label>BALANCE</label><div class="val" id="h-bal">$—</div></div>
    <div class="hstat"><label>TOTAL P&L</label><div class="val" id="h-pnl">+$0.00</div></div>
    <div class="hstat"><label>WS</label><div class="wsdot off" id="wsdot"></div></div>
  </div>
</header>
<main>
  <div class="panel">
    <div class="ph"><h3>Windows</h3><div class="badge" id="w-upd">—</div></div>
    <div class="wb">
      <div class="win-grid">
        <div class="wcard live">
          <div class="wcard-head"><span>🟢 LIVE WINDOW</span><span id="cur-ts">—</span></div>
          <div class="wcard-body">
            <div class="big-timer d" id="cur-timer">—:——</div>
            <div class="prog-wrap"><div class="prog ok" id="cur-prog" style="width:0%"></div></div>
            <div class="price-row">
              <div class="pcell"><label>BTC ↑ UP</label><div class="pval up" id="cur-up">—</div></div>
              <div class="pcell"><label>BTC ↓ DOWN</label><div class="pval dn" id="cur-dn">—</div></div>
            </div>
            <div id="cur-ladder"></div>
          </div>
        </div>
        <div class="wcard pre">
          <div class="wcard-head"><span>⏳ PRE-MARKET</span><span id="nxt-ts">—</span></div>
          <div class="wcard-body">
            <div class="price-row">
              <div class="pcell"><label>BTC ↑ UP</label><div class="pval up" id="nxt-up">—</div><div class="psub" id="nxt-up-entry"></div></div>
              <div class="pcell"><label>BTC ↓ DOWN</label><div class="pval dn" id="nxt-dn">—</div><div class="psub" id="nxt-dn-entry"></div></div>
            </div>
            <div id="nxt-status" style="font-size:10px;color:var(--amber);margin-bottom:6px">Waiting for discovery…</div>
            <div id="nxt-ladder"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="panel">
    <div class="ph"><h3>Session Stats</h3></div>
    <div class="sbar">
      <div class="sbi"><label>WINDOWS</label><value id="st-win">0</value></div>
      <div class="sbi"><label>LADDER HITS</label><value id="st-hits" style="color:var(--green)">0</value></div>
      <div class="sbi"><label>TOTAL P&L</label><value id="st-pnl">$0</value></div>
      <div class="sbi"><label>BALANCE</label><value id="st-bal" style="color:var(--cyan)">$—</value></div>
    </div>
  </div>
  <div class="panel">
    <div class="ph"><h3>Closed Windows</h3><div class="badge" id="cc">0</div></div>
    <div id="closed-t"><div class="empty">No closed windows yet</div></div>
  </div>
  <div class="panel">
    <div class="ph"><h3>System Log</h3><div class="badge" id="lc">0</div></div>
    <div id="logb"></div>
  </div>
</main>
<script>
var socket = io();
var logCount = 0;

socket.on('connect',    function(){ document.getElementById('wsdot').classList.remove('off'); });
socket.on('disconnect', function(){ document.getElementById('wsdot').classList.add('off'); });

socket.on('prices', function(p) {
  set('cur-up', fmt(p.curUp));
  set('cur-dn', fmt(p.curDn));
  set('nxt-up', fmt(p.nextUp));
  set('nxt-dn', fmt(p.nextDn));
  set('w-upd', new Date().toLocaleTimeString());
});

socket.on('snapshot', function(d) {
  set('h-bal', '$' + d.balance.toFixed(2));
  set('st-bal', '$' + d.balance.toFixed(2));
  var pe = document.getElementById('h-pnl');
  pe.textContent = (d.totalPnl >= 0 ? '+$' : '-$') + Math.abs(d.totalPnl).toFixed(2);
  pe.className = 'val' + (d.totalPnl > 0 ? ' pos' : d.totalPnl < 0 ? ' neg' : '');
  set('cc', d.closedTrades.length);
  var cl = d.closedTrades;
  set('st-win', cl.length);
  var totalHits = cl.reduce(function(s,t){ return s + (t.ladderUpHits||0) + (t.ladderDnHits||0); }, 0);
  set('st-hits', totalHits);
  var stPnl = document.getElementById('st-pnl');
  stPnl.textContent = (d.totalPnl >= 0 ? '+$' : '-$') + Math.abs(d.totalPnl).toFixed(2);
  stPnl.style.color = d.totalPnl >= 0 ? 'var(--green)' : 'var(--red)';
  if (d.current) renderCurrentWindow(d.current);
  if (d.next)    renderNextWindow(d.next);
  renderClosed(d.closedTrades);
});

socket.on('log', function(line){ addLog(line); });

function fmt(n){ return (n !== null && n !== undefined && n > 0) ? Number(n).toFixed(3) : '—'; }
function set(id, v){ var e = document.getElementById(id); if(e) e.textContent = v; }

function renderCurrentWindow(c) {
  set('cur-ts', 'ws:' + c.windowStart);
  var rem = c.remaining || 0;
  var m = Math.floor(rem/60), s = rem%60;
  var te = document.getElementById('cur-timer');
  te.textContent = m + ':' + (s<10?'0':'') + s;
  te.className = 'big-timer ' + (rem > 120 ? 'g' : rem > 30 ? 'a' : 'r');
  var pct = Math.min(100, (c.elapsed/300)*100);
  var pb = document.getElementById('cur-prog');
  pb.style.width = pct + '%';
  pb.className = 'prog ' + (pct > 80 ? 'warn' : 'ok');
  set('cur-up', fmt(c.btcUpPrice));
  set('cur-dn', fmt(c.btcDnPrice));
  if (c.wst) renderLadder('cur-ladder', c.wst, c.btcUpPrice, c.btcDnPrice);
  else document.getElementById('cur-ladder').innerHTML = '<div style="color:var(--dim2);font-size:10px;padding:6px 0">No position this window</div>';
}

function renderNextWindow(n) {
  set('nxt-ts', 'ws:' + n.windowStart);
  set('nxt-up', fmt(n.btcUpPrice));
  set('nxt-dn', fmt(n.btcDnPrice));
  if (n.bought) {
    set('nxt-up-entry', n.entryUp ? 'Entry: ' + n.entryUp.toFixed(3) : '');
    set('nxt-dn-entry', n.entryDn ? 'Entry: ' + n.entryDn.toFixed(3) : '');
    document.getElementById('nxt-status').innerHTML = '<span style="color:var(--green)">✅ BOUGHT 100 each side</span>';
    if (n.ladderUp && n.ladderDn) {
      renderLadder('nxt-ladder', { ladderUp: n.ladderUp, ladderDn: n.ladderDn, entryUp: n.entryUp, entryDn: n.entryDn, remainingUp: 100, remainingDn: 100 }, n.btcUpPrice, n.btcDnPrice);
    }
  } else {
    set('nxt-up-entry', '');
    set('nxt-dn-entry', '');
    document.getElementById('nxt-status').textContent = '⏳ Searching…';
    document.getElementById('nxt-ladder').innerHTML = '';
  }
}

function renderLadder(containerId, wst, curUp, curDn) {
  var el = document.getElementById(containerId);
  if (!wst || !wst.ladderUp || !wst.ladderDn) { el.innerHTML = ''; return; }
  var upSold = wst.ladderUp.filter(function(r){return r.sold;}).length;
  var dnSold = wst.ladderDn.filter(function(r){return r.sold;}).length;
  var html = '';
  html += '<div class="ladder-wrap">';
  html += '<div class="ladder-title">BTC ↑ SELL LADDER — ' + upSold + '/10 FILLED</div>';
  html += '<div class="ladder-bar"><div class="lbar-bg"><div class="lbar-fill" style="width:' + (upSold*10) + '%"></div></div><span class="lbar-text">' + (wst.remainingUp||0) + ' shares left</span></div>';
  html += '<div class="ladder-grid">';
  wst.ladderUp.forEach(function(r) {
    var isPending = !r.sold && curUp > 0 && curUp >= r.sellPrice * 0.97;
    html += '<div class="lrung ' + (r.sold ? 'sold' : isPending ? 'pending' : '') + '">';
    html += '<label>L' + r.level + '</label>';
    html += r.sellPrice.toFixed(3);
    if (r.sold) html += '<br>$' + r.proceeds.toFixed(2);
    html += '</div>';
  });
  html += '</div></div>';
  html += '<div class="ladder-wrap">';
  html += '<div class="ladder-title">BTC ↓ SELL LADDER — ' + dnSold + '/10 FILLED</div>';
  html += '<div class="ladder-bar"><div class="lbar-bg"><div class="lbar-fill" style="width:' + (dnSold*10) + '%"></div></div><span class="lbar-text">' + (wst.remainingDn||0) + ' shares left</span></div>';
  html += '<div class="ladder-grid">';
  wst.ladderDn.forEach(function(r) {
    var isPending = !r.sold && curDn > 0 && curDn >= r.sellPrice * 0.97;
    html += '<div class="lrung ' + (r.sold ? 'sold' : isPending ? 'pending' : '') + '">';
    html += '<label>L' + r.level + '</label>';
    html += r.sellPrice.toFixed(3);
    if (r.sold) html += '<br>$' + r.proceeds.toFixed(2);
    html += '</div>';
  });
  html += '</div></div>';
  el.innerHTML = html;
}

function renderClosed(trades) {
  var el = document.getElementById('closed-t');
  if (!trades.length) { el.innerHTML = '<div class="empty">No closed windows yet</div>'; return; }
  var rows = trades.slice().reverse().map(function(t) {
    var pnl = t.totalPnl || 0;
    return '<tr>' +
      '<td style="color:var(--cyan);font-size:10px">W' + t.windowStart + '</td>' +
      '<td>' + (t.entryUp ? t.entryUp.toFixed(3) : '—') + '</td>' +
      '<td>' + (t.entryDn ? t.entryDn.toFixed(3) : '—') + '</td>' +
      '<td>' + (t.resolvedUpPrice ? t.resolvedUpPrice.toFixed(3) : '—') + '</td>' +
      '<td>' + (t.resolvedDnPrice ? t.resolvedDnPrice.toFixed(3) : '—') + '</td>' +
      '<td style="color:var(--green)">' + (t.ladderUpHits||0) + '/10</td>' +
      '<td style="color:var(--red)">' + (t.ladderDnHits||0) + '/10</td>' +
      '<td class="' + (pnl>=0?'pos':'neg') + '">' + (pnl>=0?'+':'') + '$' + pnl.toFixed(2) + '</td>' +
      '</tr>';
  }).join('');
  el.innerHTML = '<table class="tt"><thead><tr><th>WINDOW</th><th>ENTRY↑</th><th>ENTRY↓</th><th>RESOLVED↑</th><th>RESOLVED↓</th><th>UP HITS</th><th>DN HITS</th><th>P&L</th></tr></thead><tbody>' + rows + '</tbody></table>';
}

function addLog(line) {
  var el = document.createElement('div');
  var c = 'll';
  if (line.indexOf('PRE-BUY') >= 0 || line.indexOf('Ladder') >= 0) c += ' buy';
  else if (line.indexOf('SELL') >= 0) c += ' sell';
  else if (line.indexOf('RESOLVED') >= 0 || line.indexOf('SUMMARY') >= 0) c += ' res';
  else if (line.indexOf('⚠️') >= 0) c += ' err';
  else if (line.indexOf('✅') >= 0 || line.indexOf('🚀') >= 0) c += ' inf';
  el.className = c;
  el.textContent = line;
  var lb = document.getElementById('logb');
  lb.appendChild(el);
  logCount++;
  set('lc', logCount);
  while (lb.children.length > 300) lb.removeChild(lb.firstChild);
  lb.scrollTop = lb.scrollHeight;
}
</script>
</body>
</html>
